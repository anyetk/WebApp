<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>Restablecer Contraseña - Restaurantes Explorer</title>
</head>
<body data-theme="light">
    <section class="login-screen">
        <section class="login-container">
            <h1>Restablecer Contraseña</h1>
            <p>Ingresa tu nueva contraseña</p>
            
            <article class="input-group">
                <label for="new-password">Nueva Contraseña:</label>
                <input type="password" id="new-password" required minlength="6" placeholder="Mínimo 6 caracteres">
            </article>
            
            <article class="input-group">
                <label for="confirm-password">Confirmar Contraseña:</label>
                <input type="password" id="confirm-password" required minlength="6" placeholder="Repite tu contraseña">
            </article>
            
            <article id="reset-password-message" class="info-message">
                ⏳ Inicializando...
            </article>
            
            <button id="update-password-btn" type="button" disabled>
                Actualizar Contraseña
            </button>
            
            <p style="text-align: center; margin-top: 20px;">
                <a href="index.html" style="color: var(--primary-color); text-decoration: none;">
                    ← Volver al inicio de sesión
                </a>
            </p>
        </section>
    </section>

    <!-- Cargar Supabase JS primero -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // Configuración
        const SUPABASE_URL = 'https://vudjdiokeniwsgyyxasl.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1ZGpkaW9rZW5pd3NneXl4YXNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjAzNjg2NTYsImV4cCI6MjA3NTk0NDY1Nn0.2wh4B4VhjyTRy7iuaU9ihse7yPmpj_jyRwdg7zKNawM';
        
        let supabaseClient;

        // Función para mostrar mensajes
        function showMessage(message, type = 'info') {
            const messageElement = document.getElementById('reset-password-message');
            messageElement.innerHTML = message;
            
            if (type === 'success') {
                messageElement.className = 'login-success';
            } else if (type === 'error') {
                messageElement.className = 'login-error';
            } else {
                messageElement.className = 'info-message';
            }
            
            messageElement.style.display = 'block';
        }

        // Función para habilitar/deshabilitar el botón
        function setButtonState(enabled, text = null) {
            const button = document.getElementById('update-password-btn');
            button.disabled = !enabled;
            if (text) {
                button.textContent = text;
            }
        }

        // Función para mostrar/ocultar loading
        function setLoading(isLoading) {
            const button = document.getElementById('update-password-btn');
            if (isLoading) {
                button.classList.add('loading');
                button.innerHTML = 'Actualizando...';
                button.disabled = true;
            } else {
                button.classList.remove('loading');
                button.innerHTML = 'Actualizar Contraseña';
                button.disabled = false;
            }
        }

        // Función para procesar el hash de la URL y extraer tokens
        function processHashParameters() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            
            const accessToken = params.get('access_token');
            const refreshToken = params.get('refresh_token');
            const type = params.get('type');
            
            console.log('🔗 Token parameters:', { 
                hasAccessToken: !!accessToken,
                hasRefreshToken: !!refreshToken,
                type: type 
            });
            
            return { accessToken, refreshToken, type };
        }

        // Función principal para actualizar contraseña
        async function updatePassword() {
            console.log('🔧 Iniciando actualización de contraseña...');

            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            // Validaciones
            if (!newPassword || !confirmPassword) {
                showMessage('❌ Por favor, completa todos los campos.', 'error');
                return;
            }

            if (newPassword.length < 6) {
                showMessage('❌ La contraseña debe tener al menos 6 caracteres.', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage('❌ Las contraseñas no coinciden.', 'error');
                return;
            }

            setLoading(true);

            try {
                console.log('🔄 Actualizando contraseña...');

                // Actualizar contraseña
                const { data, error } = await supabaseClient.auth.updateUser({
                    password: newPassword
                });
            
                if (error) {
                    console.error('❌ Error de Supabase:', error);
                    showMessage(`❌ Error: ${error.message}`, 'error');
                    setLoading(false);
                    return;
                }

                console.log('✅ Contraseña actualizada exitosamente:', data);
                showMessage('✅ ¡Contraseña actualizada exitosamente! Cerrando sesión y redirigiendo al login...', 'success');

                // FORZAR CIERRE DE SESIÓN antes de redirigir
                console.log('🚪 Cerrando sesión...');
                const { error: signOutError } = await supabaseClient.auth.signOut();

                if (signOutError) {
                    console.warn('⚠️ No se pudo cerrar sesión automáticamente:', signOutError);
                    showMessage('⚠️ Contraseña actualizada, pero no se pudo cerrar sesión automáticamente. Serás redirigido al login.', 'success');
                } else {
                    console.log('✅ Sesión cerrada correctamente');
                }

                // Redirigir después de 3 segundos
                setTimeout(() => {
                    console.log('🔀 Redirigiendo a login...');
                    window.location.href = 'index.html';
                }, 3000);

            } catch (error) {
                console.error('❌ Error inesperado:', error);
                showMessage(`❌ Error inesperado: ${error.message}`, 'error');
                setLoading(false);
            }
        }

        // Inicializar la aplicación
        async function initializeApp() {
            try {
                console.log('🚀 Inicializando Supabase...');
                
                // Verificar que Supabase esté disponible
                if (typeof window.supabase === 'undefined') {
                    throw new Error('La biblioteca de Supabase no se cargó correctamente');
                }
                
                // Crear cliente de Supabase
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log('✅ Cliente de Supabase creado');
                
                // Procesar parámetros del hash
                const { accessToken, refreshToken, type } = processHashParameters();
                
                if (type !== 'recovery' || !accessToken) {
                    showMessage('❌ Enlace inválido. Por favor, usa el enlace del correo electrónico.', 'error');
                    setButtonState(false);
                    return;
                }
                
                console.log('🔑 Configurando sesión con token de recuperación...');
                
                // Establecer la sesión con el token de recuperación
                const { data: sessionData, error: sessionError } = await supabaseClient.auth.setSession({
                    access_token: accessToken,
                    refresh_token: refreshToken
                });
                
                if (sessionError) {
                    console.error('❌ Error estableciendo sesión:', sessionError);
                    showMessage(`❌ Error: ${sessionError.message}`, 'error');
                    setButtonState(false);
                    return;
                }
                
                if (!sessionData.session) {
                    showMessage('❌ No se pudo establecer la sesión. El enlace puede haber expirado.', 'error');
                    setButtonState(false);
                    return;
                }
                
                console.log('✅ Sesión establecida para:', sessionData.user.email);
                showMessage(`✅ Sesión verificada para: ${sessionData.user.email}<br>Ahora puedes establecer tu nueva contraseña.`, 'success');
                setButtonState(true);
                
            } catch (error) {
                console.error('❌ Error inicializando:', error);
                showMessage(`❌ Error: ${error.message}`, 'error');
                setButtonState(false);
            }
        }

        // Cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 DOM cargado');
            
            // Configurar event listeners
            document.getElementById('update-password-btn').addEventListener('click', updatePassword);
            
            // Permitir enviar con Enter
            document.addEventListener('keypress', function(event) {
                if (event.key === 'Enter') {
                    updatePassword();
                }
            });
            
            // Inicializar la aplicación después de un breve delay para asegurar que Supabase se cargue
            setTimeout(() => {
                initializeApp();
            }, 100);
            
            console.log('🎯 Event listeners configurados');
        });

        // Debug info
        console.log('📍 URL completa:', window.location.href);
        console.log('🔗 Hash disponible:', window.location.hash.length > 0);
    </script>
</body>
</html>
